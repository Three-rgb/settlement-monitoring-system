services:
  db:
    image: postgis/postgis:16-3.4
    container_name: settlement-db
    environment:
      POSTGRES_DB: construction_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init_database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d construction_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  monitoring-app:
    build: .
    image: settlement-app:latest
    container_name: settlement-monitoring
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: construction_db
      DB_USER: postgres
      DB_PASSWORD: 123456
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    restart: "no"

volumes:
  postgres-data: